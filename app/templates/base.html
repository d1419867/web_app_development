<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Task Manager</title>
    <!-- Bootstrap 5 CSS (Used for Grid System and basic resets) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Design System -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <!-- Header -->
    <div class="row mb-4">
        <div class="col-12 text-center text-md-start">
            <h1><a href="{{ url_for('tasks.index') }}" class="text-decoration-none" style="color: inherit;">✨ Task Manager</a></h1>
            <p class="text-secondary">Manage your tasks beautifully.</p>
        </div>
    </div>

    <!-- Flash Messages (for errors and success notifications) -->
    <div class="row mb-4">
        <div class="col-12 col-md-8 mx-auto">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>
    </div>

    <!-- Main Content -->
    <div class="row">
        <div class="col-12 col-md-8 mx-auto">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-5">
            <h3 class="fw-bold mb-4 text-center">
                {% if action == 'new' %}新增收支紀錄{% else %}編輯收支紀錄{% endif %}
            </h3>
            
            <form action="{% if action == 'new' %}{{ url_for('main.create_record') }}{% else %}{{ url_for('main.update_record', id=record.id) }}{% endif %}" method="POST">
                
                <div class="mb-4">
                    <label class="form-label text-muted fw-bold">類型</label>
                    <div class="d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="typeExpense" value="expense" {% if action == 'new' or record.type == 'expense' %}checked{% endif %}>
                            <label class="form-check-label" for="typeExpense">
                                <span class="text-expense"><i class="fa-solid fa-arrow-trend-down me-1"></i>支出</span>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="type" id="typeIncome" value="income" {% if action == 'edit' and record.type == 'income' %}checked{% endif %}>
                            <label class="form-check-label" for="typeIncome">
                                <span class="text-income"><i class="fa-solid fa-arrow-trend-up me-1"></i>收入</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="amount" class="form-label text-muted fw-bold">金額</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-white"><i class="fa-solid fa-dollar-sign"></i></span>
                        <input type="number" step="0.01" min="0" class="form-control border-start-0 ps-0" id="amount" name="amount" value="{% if action == 'edit' %}{{ record.amount }}{% endif %}" required placeholder="0">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="category" class="form-label text-muted fw-bold">分類</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="" disabled {% if action == 'new' %}selected{% endif %}>請選擇分類...</option>
                        <option value="飲食" {% if action == 'edit' and record.category == '飲食' %}selected{% endif %}>飲食</option>
                        <option value="交通" {% if action == 'edit' and record.category == '交通' %}selected{% endif %}>交通</option>
                        <option value="娛樂" {% if action == 'edit' and record.category == '娛樂' %}selected{% endif %}>娛樂</option>
                        <option value="居住" {% if action == 'edit' and record.category == '居住' %}selected{% endif %}>居住</option>
                        <option value="薪資" {% if action == 'edit' and record.category == '薪資' %}selected{% endif %}>薪資</option>
                        <option value="其他" {% if action == 'edit' and record.category == '其他' %}selected{% endif %}>其他</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="date" class="form-label text-muted fw-bold">日期</label>
                    <input type="date" class="form-control" id="date" name="date" value="{% if action == 'edit' %}{{ record.date }}{% endif %}" required>
                </div>

                <div class="mb-5">
                    <label for="description" class="form-label text-muted fw-bold">備註 (選填)</label>
                    <textarea class="form-control" id="description" name="description" rows="2" placeholder="記下這筆帳的細節...">{% if action == 'edit' %}{{ record.description }}{% endif %}</textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-custom-primary btn-lg">
                        {% if action == 'new' %}新增紀錄{% else %}儲存變更{% endif %}
                    </button>
                    <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary mt-2">取消並返回</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{% if action == 'new' %}
<script>
    // 預設填入今日日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date').value = today;
</script>
{% endif %}
{% endblock %}
